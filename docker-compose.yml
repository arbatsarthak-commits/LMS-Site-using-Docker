services:
  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: student_management
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASS: root
      DB_NAME: student_management
      DB_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      # Frontend should NOT call localhost inside container.
      # Use Vite proxy: browser calls /api/* on the frontend origin.
      VITE_API_BASE_URL: /api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:

